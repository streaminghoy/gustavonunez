<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamCommand V48 (Weather Suite)</title>
    
    <!-- LIBRERÍAS ESTABLES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    
    <style>
        /* BASE */
        html, body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; width: 100%; height: 100%; overflow: hidden; }
        
        /* MODOS */
        body.dashboard-mode { background-color: #0f172a; color: white; overflow-y: auto !important; }
        body.overlay-mode { background-color: transparent !important; }
        
        /* DASHBOARD UI */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding-bottom: 80px; }
        .panel { background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; font-weight: bold; letter-spacing: 1px; color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; }
        
        /* CONTROLES */
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; flex: 1; text-transform: uppercase; color: white; background: #334155; transition: 0.2s; white-space: nowrap; }
        .btn.active { background: #2563eb; color: white; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        .btn:hover { filter: brightness(1.2); }
        .btn-link { background: #0ea5e9; padding: 4px 8px; font-size: 9px; border-radius: 4px; margin-left: 5px; cursor: pointer; color: white; border: none; font-weight: bold; display: inline-flex; align-items: center; gap: 3px; }
        .btn-link:hover { background: #0284c7; }
        
        input { background: #1e293b; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; outline: none; font-size: 14px; }
        input:focus { border-color: #3b82f6; }

        /* --- WEATHER WIDGETS --- */
        
        /* 1. DISCRETO (Pill) */
        .weather-pill { position: absolute; top: 40px; right: 40px; background: rgba(15, 23, 42, 0.9); padding: 10px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideDown 0.5s; max-width: 90vw; }
        .wp-city { font-weight: bold; text-transform: uppercase; font-size: 0.9rem; color: #94a3b8; padding-right: 15px; border-right: 1px solid #475569; white-space: nowrap; }
        .wp-temp { font-size: 1.8rem; font-weight: 800; color: white; white-space: nowrap; }
        .wp-icon { font-size: 1.5rem; }

        /* 2. IMPACTO - MODO ACTUAL (Card Lateral) */
        .weather-card { position: absolute; top: 150px; left: 50px; min-width: 300px; max-width: 400px; background: rgba(255,255,255,0.95); color: #0f172a; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.4); animation: slideRight 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .wc-header { background: #3b82f6; color: white; padding: 15px 25px; text-align: center; }
        .wc-city { font-weight: 900; text-transform: uppercase; font-size: 1.3rem; letter-spacing: 1px; word-wrap: break-word; line-height: 1.2; } 
        .wc-main { padding: 25px; text-align: center; }
        .wc-temp { font-size: 6rem; font-weight: 800; line-height: 1; letter-spacing: -3px; color: #0f172a; }
        .wc-desc { text-transform: uppercase; font-weight: bold; color: #64748b; margin-top: 5px; font-size: 1.2rem; }

        /* 3. IMPACTO - MODO EXTENDIDO (3 Cuadros Grandes) */
        .forecast-container { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); width: 80%; justify-content: center; }
        .fc-card { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.1); width: 220px; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; }
        .fc-card.highlight { background: rgba(37, 99, 235, 0.9); border-color: #60a5fa; transform: scale(1.05); z-index: 10; }
        .fc-label { font-size: 1rem; font-weight: 900; text-transform: uppercase; color: #94a3b8; letter-spacing: 2px; margin-bottom: 10px; }
        .fc-card.highlight .fc-label { color: white; opacity: 0.8; }
        .fc-temp { font-size: 4.5rem; font-weight: 800; color: white; line-height: 1; margin: 10px 0; }
        .fc-icon { font-size: 2rem; margin-bottom: 5px; }
        
        /* Label Ciudad Flotante para Extendido */
        .city-float { position: absolute; top: -70px; left: 50%; transform: translateX(-50%); background: rgba(59, 130, 246, 0.95); padding: 10px 40px; border-radius: 50px; font-weight: 900; text-transform: uppercase; font-size: 1.5rem; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); white-space: nowrap; border: 2px solid rgba(255,255,255,0.2); }

        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translate(-50%, 100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MQTT_CONFIG = { host: 'broker.emqx.io', port: 8084, path: '/mqtt' };
        
        // ID de Sesión único
        const SESSION_ID = 'weather_v48_' + Math.floor(Math.random() * 9999);

        const initialState = {
            id: Date.now(),
            // WEATHER DATA
            weather: {
                visible: false,
                style: 'impact', // 'discrete' | 'impact'
                view: 'current', // 'current' | 'extended'
                city: 'Buenos Aires',
                temp: 24,
                desc: 'Soleado',
                forecast: { morn: 18, aft: 26, night: 20 }
            },
            // Otros (Simplificados)
            lt: { visible: false, title: "JUAN PÉREZ", subtitle: "Director" },
            ticker: { visible: false, text: "NOTICIAS...", speed: 20 }
        };

        const App = () => {
            const [data, setData] = useState(initialState);
            const [mode, setMode] = useState('dashboard');
            const [module, setModule] = useState('all');
            const [status, setStatus] = useState('offline');
            const [searchInput, setSearchInput] = useState("");
            const [loading, setLoading] = useState(false);
            const clientRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                let m = params.get('mode') || 'dashboard';
                const currentSession = params.get('id') || SESSION_ID;
                const mod = params.get('module') || 'all';
                
                setData(prev => ({...prev, sessionId: currentSession}));
                setMode(m);
                setModule(mod);

                if(m === 'overlay') document.body.classList.add('overlay-mode');
                else document.body.classList.add('dashboard-mode');

                const client = mqtt.connect(`wss://${MQTT_CONFIG.host}:${MQTT_CONFIG.port}${MQTT_CONFIG.path}`, { 
                    clientId: 'client_' + Math.random().toString(16).substr(2, 8) 
                });

                client.on('connect', () => { 
                    setStatus('online'); 
                    client.subscribe(`sc_v48_multi/${currentSession}/data`);
                });
                
                client.on('message', (topic, msg) => {
                    if (m === 'overlay') {
                        try { setData(JSON.parse(msg.toString())); } catch(e) {}
                    }
                });

                clientRef.current = client;
                return () => client.end();
            }, []);

            const update = (newData) => {
                setData(newData);
                if (clientRef.current?.connected) clientRef.current.publish(`sc_v48_multi/${data.sessionId}/data`, JSON.stringify(newData), { retain: true });
            };
            
            const setObj = (k, f, v) => update({ ...data, [k]: { ...data[k], [f]: v } });

            // --- LÓGICA DEL TIEMPO ---
            const fetchWeather = async () => {
                if(!searchInput) return;
                setLoading(true);
                try {
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(searchInput)}&count=1&language=es&format=json`);
                    const geoData = await geoRes.json();
                    
                    if(!geoData.results) { alert("Ciudad no encontrada"); setLoading(false); return; }
                    
                    const { latitude, longitude, name } = geoData.results[0];
                    
                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&hourly=temperature_2m&timezone=auto`);
                    const weatherData = await weatherRes.json();
                    
                    const mornTemp = weatherData.hourly.temperature_2m[9]; // 09:00
                    const aftTemp = weatherData.hourly.temperature_2m[15]; // 15:00
                    const nightTemp = weatherData.hourly.temperature_2m[21]; // 21:00

                    update({
                        ...data,
                        weather: {
                            ...data.weather,
                            city: `${name}`,
                            temp: Math.round(weatherData.current_weather.temperature),
                            desc: "Actualizado",
                            forecast: {
                                morn: Math.round(mornTemp),
                                aft: Math.round(aftTemp),
                                night: Math.round(nightTemp)
                            },
                            visible: true 
                        }
                    });

                } catch (error) {
                    console.error(error);
                    alert("Error obteniendo datos del clima.");
                }
                setLoading(false);
            };

            const copyLink = (type) => {
                const baseUrl = window.location.href.split('?')[0];
                const id = data.sessionId || SESSION_ID;
                const url = `${baseUrl}?mode=overlay&id=${id}${type !== 'all' ? '&module='+type : ''}`;
                navigator.clipboard.writeText(url);
                alert(`URL copiada: ${type.toUpperCase()}`);
            };

            // --- RENDER OVERLAY ---
            if (mode === 'overlay') {
                const showAll = module === 'all';
                const showWeather = showAll || module.includes('weather');
                const showTicker = showAll || module === 'ticker';
                
                // --- LÓGICA DE VISUALIZACIÓN MULTI-SALIDA ---
                const forcePill = module === 'weather-pill';
                const forceCard = module === 'weather-card';
                const forceExtended = module === 'weather-extended';
                
                // Si es Pill, se muestra si se forzó O si es el estilo master
                const isPill = forcePill || (showWeather && data.weather.style === 'discrete' && !forceCard && !forceExtended);
                
                // Si es Card, se muestra si se forzó O si es estilo master impact+current
                const isCard = forceCard || (showWeather && data.weather.style === 'impact' && data.weather.view === 'current' && !forcePill && !forceExtended);
                
                // Si es Extended, se muestra si se forzó O si es estilo master impact+extended
                const isExtended = forceExtended || (showWeather && data.weather.style === 'impact' && data.weather.view === 'extended' && !forcePill && !forceCard);

                return (
                    <div>
                        {/* WIDGET CLIMA */}
                        {data.weather.visible && (
                            <div>
                                {/* ESTILO DISCRETO (Pill) */}
                                {isPill && (
                                    <div className="weather-pill">
                                        <div className="wp-city">{data.weather.city}</div>
                                        <div className="wp-icon">🌤️</div>
                                        <div className="wp-temp">{data.weather.temp}°</div>
                                    </div>
                                )}

                                {/* VISTA 1: ACTUAL (Tarjeta Lateral) */}
                                {isCard && (
                                    <div className="weather-card">
                                        <div className="wc-header">
                                            <div className="wc-city">{data.weather.city}</div>
                                        </div>
                                        <div className="wc-main">
                                            <div className="wc-temp">{data.weather.temp}°</div>
                                            <div className="wc-desc">TEMPERATURA ACTUAL</div>
                                        </div>
                                    </div>
                                )}

                                {/* VISTA 2: EXTENDIDO (3 Cuadros) */}
                                {isExtended && (
                                    <div className="forecast-container">
                                        <div className="city-float">{data.weather.city}</div>
                                        <div className="fc-card">
                                            <div className="fc-label">Mañana</div>
                                            <div className="fc-icon">🌅</div>
                                            <div className="fc-temp">{data.weather.forecast.morn}°</div>
                                        </div>
                                        <div className="fc-card highlight">
                                            <div className="fc-label">Tarde</div>
                                            <div className="fc-icon">☀️</div>
                                            <div className="fc-temp">{data.weather.forecast.aft}°</div>
                                        </div>
                                        <div className="fc-card">
                                            <div className="fc-label">Noche</div>
                                            <div className="fc-icon">🌙</div>
                                            <div className="fc-temp">{data.weather.forecast.night}°</div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* OTROS MODULOS (Compatibilidad) */}
                        {showTicker && data.ticker.visible && <div style={{position:'absolute', bottom:0, width:'100%', background:'#0f172a', color:'white', padding:10, borderTop:'4px solid #ef4444'}}><b>NOTICIAS:</b> {data.ticker.text}</div>}
                    </div>
                );
            }

            // --- RENDER DASHBOARD ---
            return (
                <div className="container">
                    <div className="panel" style={{flexDirection:'row', justifyContent:'space-between', alignItems:'center', marginBottom:20}}>
                        <h1 style={{margin:0}}>STREAM<span style={{color:'#3b82f6'}}>WEATHER</span> V48</h1>
                        <div style={{display:'flex', gap:10, alignItems:'center'}}>
                            <span style={{fontSize:10, color: status==='online'?'#22c55e':'red'}}>{status.toUpperCase()}</span>
                            <button className="btn active" onClick={() => copyLink('all')}>COPIAR URL MASTER</button>
                        </div>
                    </div>

                    <div className="grid">
                        
                        {/* PANEL CLIMA PRO */}
                        <div className="panel" style={{borderLeft:'4px solid #0ea5e9'}}>
                            <div className="panel-header">
                                CONTROL DEL TIEMPO 
                                <div style={{display:'flex', gap:5}}>
                                    <button className="btn-link" onClick={()=>copyLink('weather-pill')}>🔗 DISCRETO</button>
                                    <button className="btn-link" onClick={()=>copyLink('weather-card')}>🔗 ACTUAL</button>
                                    <button className="btn-link" onClick={()=>copyLink('weather-extended')}>🔗 EXTENDIDO</button>
                                </div>
                            </div>
                            
                            {/* BUSCADOR */}
                            <div style={{display:'flex', gap:10}}>
                                <input value={searchInput} onChange={e=>setSearchInput(e.target.value)} placeholder="Ciudad, Pais (ej: Barcelona, ES)" onKeyPress={(e)=>e.key==='Enter'&&fetchWeather()} />
                                <button className="btn active" onClick={fetchWeather} disabled={loading}>{loading ? '...' : 'BUSCAR'}</button>
                            </div>

                            {/* PREVISUALIZACIÓN DATOS */}
                            <div style={{display:'flex', justifyContent:'space-between', background:'rgba(255,255,255,0.05)', padding:10, borderRadius:8}}>
                                <div>
                                    <div style={{fontSize:10, color:'#94a3b8'}}>ACTUAL</div>
                                    <div style={{fontSize:24, fontWeight:'bold'}}>{data.weather.temp}°</div>
                                </div>
                                <div style={{textAlign:'right'}}>
                                    <div style={{fontSize:12}}>Mañana: <b>{data.weather.forecast.morn}°</b></div>
                                    <div style={{fontSize:12}}>Tarde: <b>{data.weather.forecast.aft}°</b></div>
                                    <div style={{fontSize:12}}>Noche: <b>{data.weather.forecast.night}°</b></div>
                                </div>
                            </div>

                            {/* CONTROLES VISIBILIDAD Y ESTILO */}
                            <div className="row">
                                <button className={`btn ${data.weather.visible?'active':''}`} onClick={()=>setObj('weather','visible',!data.weather.visible)}>{data.weather.visible?'OCULTAR WIDGET':'MOSTRAR WIDGET'}</button>
                            </div>
                            
                            <div className="row">
                                <label style={{fontSize:11, color:'#94a3b8'}}>TIPO (MASTER):</label>
                                <button className={`btn ${data.weather.style==='discrete'?'active':''}`} onClick={()=>setObj('weather','style','discrete')}>DISCRETO</button>
                                <button className={`btn ${data.weather.style==='impact'?'active':''}`} onClick={()=>setObj('weather','style','impact')}>IMPACTO</button>
                            </div>

                            {/* NUEVO: SELECTOR DE VISTA (Solo para Impacto) */}
                            {data.weather.style === 'impact' && (
                                <div className="row" style={{marginTop:5, background:'rgba(0,0,0,0.2)', padding:10, borderRadius:8}}>
                                    <label style={{fontSize:11, color:'#94a3b8'}}>VISTA:</label>
                                    <button className={`btn ${data.weather.view==='current'?'active':''}`} onClick={()=>setObj('weather','view','current')}>ACTUAL (SIMPLE)</button>
                                    <button className={`btn ${data.weather.view==='extended'?'active':''}`} onClick={()=>setObj('weather','view','extended')}>EXTENDIDO (3 CUADROS)</button>
                                </div>
                            )}
                        </div>

                        {/* EXTRAS */}
                        <div className="panel">
                            <div className="panel-header">TICKER SIMPLE <button className="btn-link" onClick={()=>copyLink('ticker')}>🔗 URL</button></div>
                            <div className="row"><button className={`btn ${data.ticker.visible?'active':''}`} onClick={()=>setObj('ticker','visible',!data.ticker.visible)}>ON/OFF</button></div>
                            <input value={data.ticker.text} onChange={e=>setObj('ticker','text',e.target.value)} />
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
